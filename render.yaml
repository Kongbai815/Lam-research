services:
  - type: web
    name: research-ai-test
    runtime: node
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: node scripts/start.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
      - key: RESEARCH_AI_SHOW_DEV_CODE
        value: "false"
      - key: RANKING_API_URL
        value: https://researcher-ranking-szk6rqcdwa-uc.a.run.app
      - key: RESEARCH_AI_SECRET
        generateValue: true
      - key: DEFAULT_AI_PROVIDER
        value: gpt
      - key: DEFAULT_AI_API_BASE_URL
        value: https://api.openai.com/v1
      - key: DEFAULT_AI_MODEL
        value: gpt-5.2
      - key: DEFAULT_AI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
